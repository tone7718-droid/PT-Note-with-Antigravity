name: CI

# 푸시 / PR 마다 lint + 타입 검사 + 정적 빌드 검증.
# (PT-Progress-Note 의 ci.yml 이식 — 유닛테스트는 Vitest 도입 후 추가 예정.
#  Playwright E2E 는 dev 서버 기동이 필요해 별도 잡으로 분리할 것.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
